<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P.O.T.O — Central (NOC)</title>
  <link rel="icon" href="/poto-logo-3.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Michroma&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" />
  <link rel="stylesheet" href="/src/styles.css?v=11" />
</head>
<body class="noc-body">
  <!-- Barra lateral -->
  <aside class="noc-side">
    <div class="noc-side-head">
      <button class="noc-logo" id="logo-home" type="button" aria-label="Ir para o Painel">
        <span class="sym sym-md" aria-hidden="true">bug_report</span>
        <div class="wm">P<span class="d">.</span>O<span class="d">.</span>T<span class="d">.</span>O</div>
      </button>
      <div class="noc-sys"><span class="dot"></span>Sistema ativo</div>
    </div>
    <nav class="noc-nav" aria-label="Navegação">
      <a class="active" href="#" data-view="painel" aria-current="page"><span class="sym sym-sm" aria-hidden="true">dashboard</span>Painel</a>
      <a href="#" data-view="incidentes"><span class="sym sym-sm" aria-hidden="true">emergency</span>Incidentes</a>
      <a href="#" data-view="totens"><span class="sym sym-sm" aria-hidden="true">settings_remote</span>Totens</a>
      <a href="#" data-view="analises"><span class="sym sym-sm" aria-hidden="true">analytics</span>Análises</a>
    </nav>
    <div class="noc-op">
      <div class="noc-avatar">OP</div>
      <div class="noc-op-info">
        <span class="noc-op-name">Operador 04</span>
        <span class="noc-op-turno">Turno: Alpha</span>
      </div>
    </div>
  </aside>

  <!-- Canvas principal -->
  <main class="noc-main">
    <header class="noc-top">
      <div class="brand compact">
        <button class="wm wm-home" id="brand-home" type="button" aria-label="Ir para o Painel">P<span class="d">.</span>O<span class="d">.</span>T<span class="d">.</span>O</button>
        <span class="panel-label">Plataforma de Orientação, Triagem e Ouvidoria</span>
      </div>
      <span id="status" class="status"><span class="dot"></span>…</span>
    </header>

    <section id="view-painel" class="view">
      <div class="noc-controls">
        <label class="noc-search">
          <span class="sym sym-sm" aria-hidden="true">search</span>
          <input id="busca" type="search" placeholder="Buscar ID de ocorrência, totem ou canal…" />
        </label>
        <div class="gfilters" id="gfilters" role="group" aria-label="Filtros de triagem"></div>
      </div>
      <div class="noc-scroll">
        <div class="noc-grid" id="lista"></div>
      </div>
    </section>

    <section id="view-totens" class="view" hidden>
      <div class="noc-controls">
        <h2 class="noc-vtitle">Frota de totens</h2>
        <span id="totens-resumo" class="noc-resumo"></span>
      </div>
      <div class="noc-scroll">
        <div class="noc-grid totens" id="totens-lista"></div>
      </div>
    </section>

    <section id="view-incidentes" class="view" hidden>
      <div class="noc-controls">
        <label class="noc-search">
          <span class="sym sym-sm" aria-hidden="true">search</span>
          <input id="inc-busca" type="search" placeholder="Buscar ID, totem ou canal…" />
        </label>
        <div class="inc-filtros">
          <select id="inc-grav" aria-label="Gravidade">
            <option value="">Toda gravidade</option>
            <option value="risco_imediato">Imediato</option>
            <option value="risco_potencial">Potencial</option>
            <option value="orientacao">Orientação</option>
          </select>
          <select id="inc-status" aria-label="Estado">
            <option value="">Todo estado</option>
            <option value="abertos">Em aberto</option>
            <option value="alerta_ativo">Alerta ativo</option>
            <option value="notificado">Aguardando</option>
            <option value="reconhecido">Reconhecido</option>
            <option value="em_atendimento">Em atendimento</option>
            <option value="encerrado">Encerrado</option>
          </select>
          <button id="inc-export" type="button" class="btn-ghost">
            <span class="sym sym-xs" aria-hidden="true">download</span>Exportar CSV
          </button>
        </div>
      </div>
      <div class="noc-scroll">
        <div id="inc-tabela"></div>
      </div>
    </section>

    <section id="view-analises" class="view" hidden>
      <div class="noc-controls">
        <h2 class="noc-vtitle">Análises</h2>
        <span id="an-resumo" class="noc-resumo"></span>
      </div>
      <div class="noc-scroll">
        <div id="an-corpo"></div>
      </div>
    </section>
  </main>

  <!-- Drawer de detalhe / auditoria -->
  <div id="drawer"></div>

  <script type="module" src="/dist/painel.js?v=11"></script>
</body>
</html>
